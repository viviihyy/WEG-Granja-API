spring.application.name=weg-granja

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

server.port=${PORT:8080}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.serialization.write-dates-as-timestamps=false

app.refeicao.almoco.inicio=10:30
app.refeicao.almoco.fim=15:00
app.refeicao.janta.inicio=15:00
app.refeicao.janta.fim=22:00

app.jwt.secret=${JWT_SECRET:troque-esta-chave-secreta-em-producao-com-no-minimo-32-caracteres}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.admin.nome=${ADMIN_NOME:Administrador}
app.admin.email=${ADMIN_EMAIL:admin@weg.com}
app.admin.senha=${ADMIN_SENHA:admin123}