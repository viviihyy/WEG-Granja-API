spring.application.name=weg-granja

# Banco de dados MySQL (Railway) ? via variÃveis de ambiente
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Porta dinãmica do Render (fallback 8080 para rodar local)
server.port=${PORT:8080}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Timezone da aplicaÓÐo
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.serialization.write-dates-as-timestamps=false

# Janelas de horÃrio do refeitµrio (HH:mm)
app.refeicao.almoco.inicio=10:30
app.refeicao.almoco.fim=15:00
app.refeicao.janta.inicio=15:00
app.refeicao.janta.fim=22:00