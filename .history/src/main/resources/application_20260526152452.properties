spring.application.name=weg-granja

# Banco de dados MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/weg_granja?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=mysqlPW
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Timezone da aplicação
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.serialization.write-dates-as-timestamps=false

# Janelas de horário do refeitório (HH:mm)
app.refeicao.almoco.inicio=10:30
app.refeicao.almoco.fim=15:00
app.refeicao.janta.inicio=16:00
app.refeicao.janta.fim=22:00
